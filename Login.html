<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestão de Laticínios</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .login-container {
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(0, 123, 255, 0.1), rgba(255, 165, 0, 0.05));
            border-radius: 12px;
            pointer-events: none;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #007bff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .login-header p {
            color: #b0b0b0;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #e0e0e0;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.3);
            outline: none;
        }

        input[type="password"]:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #b0b0b0;
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #007bff;
        }

        .validation-message {
            font-size: 0.875rem;
            margin-top: 5px;
            display: block;
        }

        .valid {
            color: #28a745;
        }

        .invalid {
            color: #dc3545;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .btn:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.875rem;
            color: #b0b0b0;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
                margin: 20px;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <header class="login-header">
            <h1>Sistema de Gestão de Laticínios</h1>
            <p>Acesse sua conta para continuar</p>
        </header>
        <form id="loginForm" action="/login" method="POST">
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required aria-describedby="cpfValidation">
                <span id="cpfValidation" class="validation-message" aria-live="polite"></span>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar/ocultar senha">👁️</button>
            </div>
            <div class="form-group">
                <label for="serverIP">IP do Servidor</label>
                <input type="text" id="serverIP" name="serverIP" placeholder="192.168.1.1" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <footer class="footer">
            <p>&copy; 2023 Empresa de Laticínios. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script>
        // Máscara CPF
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
                e.target.value = value;
            }
            validateCPF(value.replace(/\D/g, ''));
        });

        // Validação CPF
        function validateCPF(cpf) {
            const validationMsg = document.getElementById('cpfValidation');
            if (cpf.length === 11) {
                // Lógica simples de validação (pode ser aprimorada)
                let sum = 0;
                for (let i = 0; i < 9; i++) {
                    sum += parseInt(cpf[i]) * (10 - i);
                }
                let remainder = (sum * 10) % 11;
                if (remainder === 10) remainder = 0;
                if (remainder === parseInt(cpf[9])) {
                    sum = 0;
                    for (let i = 0; i < 10; i++) {
                        sum += parseInt(cpf[i]) * (11 - i);
                    }
                    remainder = (sum * 10) % 11;
                    if (remainder === 10) remainder = 0;
                    if (remainder === parseInt(cpf[10])) {
                        validationMsg.textContent = 'CPF válido';
                        validationMsg.className = 'validation-message valid';
                        return;
                    }
                }
            }
            if (cpf.length > 0) {
                validationMsg.textContent = 'CPF inválido';
                validationMsg.className = 'validation-message invalid';
            } else {
                validationMsg.textContent = '';
            }
        }

        // Toggle senha
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordField = document.getElementById('password');
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Validação frontend básica no submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
            const password = document.getElementById('password').value;
            const serverIP = document.getElementById('serverIP').value;

            if (cpf.length !== 11 || !validateCPF(cpf)) {
                alert('CPF inválido');
                e.preventDefault();
                return;
            }

            if (password.length < 6) {
                alert('Senha deve ter pelo menos 6 caracteres');
                e.preventDefault();
                return;
            }

            // Aqui você pode adicionar lógica para conectar ao IP do servidor via fetch ou similar
            // Exemplo: fetch(`http://${serverIP}/login`, { method: 'POST', body: new FormData(this) })
            // Mas para produção, use uma API segura.
        });
    </script>
</body>
</html>
