<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro — Tecnobloco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <style>
    .mod-stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-4); margin-bottom:var(--space-6); }
    @media(max-width:900px){.mod-stat-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:500px){.mod-stat-grid{grid-template-columns:1fr;}}
    .mod-fn-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:var(--space-3); }
    .mod-fn-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--space-2); padding:var(--space-4) var(--space-3); background:rgba(255,255,255,0.03); border:1px solid var(--border-color); border-radius:var(--border-radius); color:var(--text-secondary); font-size:var(--font-size-sm); font-weight:var(--font-weight-medium); cursor:pointer; transition:all var(--transition); text-align:center; }
    .mod-fn-btn:hover { background:rgba(124,58,237,0.1); border-color:rgba(124,58,237,0.3); color:var(--text-primary); transform:translateY(-1px); }
    .mod-fn-icon { font-size:22px; }
    .stat-card{display:block;position:relative;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:var(--space-4);transition:transform .2s,box-shadow .2s;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sc-a,#7c3aed),var(--sc-b,#a78bfa));}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);}
    .stat-card-title{font-size:var(--font-size-sm);color:var(--text-muted);font-weight:600;}
    .stat-card-icon{font-size:1.5rem;opacity:.8;}
    .stat-card-value{font-size:2.1rem;font-weight:800;color:var(--text-primary);margin-bottom:4px;line-height:1;}
    .stat-card-sub{font-size:var(--font-size-xs);color:var(--text-muted);}
    .stat-card.success{--sc-a:#22c55e;--sc-b:#4ade80;}.stat-card.success .stat-card-value{color:#4ade80;}
    .stat-card.warning{--sc-a:#f97316;--sc-b:#fb923c;}.stat-card.warning .stat-card-value{color:#fb923c;}
    .stat-card.danger{--sc-a:#ef4444;--sc-b:#f87171;}.stat-card.danger .stat-card-value{color:#f87171;}
    .stat-card.info{--sc-a:#3b82f6;--sc-b:#60a5fa;}.stat-card.info .stat-card-value{color:#60a5fa;}
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="topbar-container"></div>
  <main class="main-content" id="main-content">

      <div class="mod-stat-grid">
        <div class="stat-card danger"><div class="stat-card-header"><span class="stat-card-title">Contas a Pagar Vencidas</span><span>📉</span></div><div class="stat-card-value" id="stat-cp-vencidas">—</div><div class="stat-card-sub">necessitam atenção</div></div>
        <div class="stat-card warning"><div class="stat-card-header"><span class="stat-card-title">A Pagar (7 dias)</span><span>📅</span></div><div class="stat-card-value" id="stat-cp-proximas">—</div><div class="stat-card-sub">vencendo em breve</div></div>
        <div class="stat-card success"><div class="stat-card-header"><span class="stat-card-title">A Receber (Mês)</span><span>💹</span></div><div class="stat-card-value" id="stat-cr-mes">—</div><div class="stat-card-sub">R$</div></div>
        <div class="stat-card"><div class="stat-card-header"><span class="stat-card-title">Adiantamentos Pendentes</span><span>💰</span></div><div class="stat-card-value" id="stat-adi">—</div><div class="stat-card-sub">aguardando aprovação</div></div>
      </div>

      <div class="content-card" style="margin-bottom:var(--space-5);">
        <div class="card-header"><h3 class="card-title">Funções do Setor</h3></div>
        <div class="mod-fn-grid" id="mod-fn-grid"><div class="page-loader"><span class="spinner"></span></div></div>
      </div>

      <div class="content-card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <h3 class="card-title">Contas a Pagar — Próximas</h3>
          <button class="btn btn-sm btn-secondary" id="mod-refresh">↻ Atualizar</button>
        </div>
        <div id="mod-list"><div class="page-loader"><span class="spinner"></span></div></div>
      </div>

  </main>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/funcoes/_core.js"></script>
<script src="../../assets/js/funcoes/global_forms.js"></script>
<script src="../../assets/js/funcoes/financeiro_forms.js"></script>
<script src="../../assets/js/funcoes/financeiro.js"></script>
<script>
'use strict';
const FIN_FUNCTIONS = [
  { fn: 'f01VerEscala',         icon: '📅', label: 'Ver Escala',            nivel: 0 },
  { fn: 'f02ContasPagar',       icon: '📉', label: 'Contas a Pagar',        nivel: 4 },
  { fn: 'f03ContasReceber',     icon: '📈', label: 'Contas a Receber',      nivel: 4 },
  { fn: 'f04FluxoCaixa',        icon: '📊', label: 'Fluxo de Caixa',        nivel: 5 },
  { fn: 'f05PlanoConta',        icon: '📋', label: 'Plano de Contas',       nivel: 5 },
  { fn: 'f06Fornecedores',      icon: '🏢', label: 'Fornecedores',          nivel: 4 },
  { fn: 'f07MovimentosBancarios',icon: '🏦', label: 'Movimentos Bancários', nivel: 5 },
  { fn: 'f08CentrosCusto',      icon: '🎯', label: 'Centros de Custo',      nivel: 5 },
  { fn: 'f09Adiantamentos',     icon: '💰', label: 'Adiantamentos',         nivel: 5 },
  { fn: 'f10GerenciarEscalas',  icon: '📆', label: 'Gerenciar Escalas',     nivel: 5 },
];

async function loadStats() {
  try {
    const d = await API.get('/financeiro/stats');
    const s = d.data || d;
    document.getElementById('stat-cp-vencidas').textContent = s.contasPagarVencidas ?? '—';
    document.getElementById('stat-cp-proximas').textContent = s.contasPagarProximas ?? '—';
    document.getElementById('stat-cr-mes').textContent = s.contasReceberMes != null ? 'R$'+Number(s.contasReceberMes).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—';
    document.getElementById('stat-adi').textContent = s.adiantamentosPendentes ?? '—';
  } catch(e) { console.warn('stats', e); }
}

async function loadRecentes() {
  const wrap = document.getElementById('mod-list');
  try {
    const d = await API.get('/financeiro/recentes');
    const rows = Array.isArray(d) ? d : (d.data || []);
    if (!rows.length) { wrap.innerHTML = '<div class="empty-state"><span class="empty-state-icon">📭</span><span class="empty-state-title">Nenhuma conta próxima</span></div>'; return; }
    wrap.innerHTML = `<div style="overflow-x:auto;"><table class="table table-hover"><thead><tr><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${escapeHtml(r.descricao||'—')}</td><td>R$ ${Number(r.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td>${r.data_vencimento?new Date(r.data_vencimento).toLocaleDateString('pt-BR'):'—'}</td><td><span class="badge badge-${r.status==='pago'||r.status==='recebido'?'success':r.status==='vencido'?'danger':'warning'}">${escapeHtml(r.status||'—')}</span></td></tr>`).join('')}</tbody></table></div>`;
  } catch(e) { wrap.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><span class="empty-state-title">${escapeHtml(e.message||'Erro')}</span></div>`; }
}

function renderFunctions(user) {
  const grid = document.getElementById('mod-fn-grid');
  const vis = FIN_FUNCTIONS.filter(f => user.nivel_acesso >= f.nivel);
  if (!vis.length) { grid.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🔒</span><span class="empty-state-title">Nenhuma função disponível</span></div>'; return; }
  grid.innerHTML = vis.map(f=>`<button class="mod-fn-btn" data-fn="${escapeHtml(f.fn)}"><span class="mod-fn-icon">${f.icon}</span><span>${escapeHtml(f.label)}</span></button>`).join('');
  grid.addEventListener('click', e=>{
    const btn = e.target.closest('.mod-fn-btn'); if (!btn) return;
    const fn = btn.getAttribute('data-fn');
    if (window.FuncoesFinanceiro && typeof window.FuncoesFinanceiro[fn]==='function') window.FuncoesFinanceiro[fn]();
  });
}

async function onReady(user) {
  await Promise.all([loadStats(), loadRecentes()]);
  renderFunctions(user);
  document.getElementById('mod-refresh').addEventListener('click', loadRecentes);
}

initPage({ title:'Financeiro', breadcrumb:['Financeiro'], requireNivel:4, activeMenu:'financeiro', onReady });
</script>
</body>
</html>
