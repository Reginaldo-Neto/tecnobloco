<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lavanderia — Tecnobloco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <style>
    .lav-stat-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    @media (max-width: 1100px) { .lav-stat-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px)  { .lav-stat-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 450px)  { .lav-stat-grid { grid-template-columns: 1fr; } }

    .lav-fn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: var(--space-3);
    }
    .lav-fn-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: var(--space-2);
      padding: var(--space-4) var(--space-3);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      cursor: pointer; text-align: center;
      transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
    }
    .lav-fn-btn:hover {
      background: rgba(139,92,246,0.1);
      border-color: rgba(139,92,246,0.3);
      color: var(--text-primary);
      transform: translateY(-1px);
    }
    .lav-fn-icon { font-size: 22px; }

    .lav-alert-bar { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-5); }
    .lav-alert-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px;
      font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
    }
    .lav-alert-chip.danger  { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .lav-alert-chip.warning { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
    .lav-alert-chip.info    { background: rgba(59,130,246,0.12);  color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .lav-alert-chip.success { background: rgba(34,197,94,0.12);   color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

    .stat-card{display:block;position:relative;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:var(--space-4);transition:transform .2s,box-shadow .2s;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sc-a,#7c3aed),var(--sc-b,#a78bfa));}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);}
    .stat-card-title{font-size:var(--font-size-sm);color:var(--text-muted);font-weight:600;}
    .stat-card-icon{font-size:1.5rem;opacity:.8;}
    .stat-card-value{font-size:2.1rem;font-weight:800;color:var(--text-primary);margin-bottom:4px;line-height:1;}
    .stat-card-sub{font-size:var(--font-size-xs);color:var(--text-muted);}
    .stat-card.success{--sc-a:#22c55e;--sc-b:#4ade80;}.stat-card.success .stat-card-value{color:#4ade80;}
    .stat-card.warning{--sc-a:#f97316;--sc-b:#fb923c;}.stat-card.warning .stat-card-value{color:#fb923c;}
    .stat-card.danger{--sc-a:#ef4444;--sc-b:#f87171;}.stat-card.danger .stat-card-value{color:#f87171;}
    .stat-card.info{--sc-a:#3b82f6;--sc-b:#60a5fa;}.stat-card.info .stat-card-value{color:#60a5fa;}
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="topbar-container"></div>
  <main class="main-content" id="main-content">

      <!-- Alerts -->
      <div id="lav-alerts" class="lav-alert-bar"></div>

      <!-- Stats -->
      <div class="lav-stat-grid">
        <div class="stat-card warning">
          <div class="stat-card-header"><span class="stat-card-title">Entradas Pendentes</span><span class="stat-card-icon">👕</span></div>
          <div class="stat-card-value" id="stat-entradas">—</div>
          <div class="stat-card-sub">aguardando triagem/lavagem</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-title">Ciclos em Andamento</span><span class="stat-card-icon">🔄</span></div>
          <div class="stat-card-value" id="stat-ciclos">—</div>
          <div class="stat-card-sub">lotes de lavagem ativos</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-card-header"><span class="stat-card-title">Reparos Pendentes</span><span class="stat-card-icon">🧵</span></div>
          <div class="stat-card-value" id="stat-reparos">—</div>
          <div class="stat-card-sub">aguardando costura</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-title">Solicitações</span><span class="stat-card-icon">📋</span></div>
          <div class="stat-card-value" id="stat-solicitacoes">—</div>
          <div class="stat-card-sub">higienização pendente</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-card-header"><span class="stat-card-title">Químicos em Falta</span><span class="stat-card-icon">🧪</span></div>
          <div class="stat-card-value" id="stat-quimicos">—</div>
          <div class="stat-card-sub">abaixo do estoque mínimo</div>
        </div>
      </div>

      <!-- Function grid -->
      <div class="content-card" style="margin-bottom:var(--space-5);">
        <div class="card-header">
          <h3 class="card-title">Funções do Setor</h3>
        </div>
        <div class="lav-fn-grid" id="lav-fn-grid">
          <div class="page-loader"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Recent entries -->
      <div class="content-card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <h3 class="card-title">Últimas Entradas</h3>
          <button class="btn btn-sm btn-secondary" id="lav-refresh">↻ Atualizar</button>
        </div>
        <div id="lav-entradas-wrap">
          <div class="page-loader"><span class="spinner"></span></div>
        </div>
      </div>

  </main>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/funcoes/_core.js"></script>
<script src="../../assets/js/funcoes/global_forms.js"></script>
<script src="../../assets/js/funcoes/lavanderia_forms.js"></script>
<script src="../../assets/js/funcoes/lavanderia.js"></script>
<script>
'use strict';

const LAV_FUNCTIONS = [
  { fn: 'f01RecebimentoTriagem',            icon: '👕', label: 'Recebimento e Triagem',         nivel: 2 },
  { fn: 'f02RegistroCiclosLavagem',         icon: '🔄', label: 'Ciclos de Lavagem',             nivel: 2 },
  { fn: 'f03ControleQuimicos',              icon: '🧪', label: 'Controle de Químicos',           nivel: 3 },
  { fn: 'f04HigienizacaoBotasAventais',     icon: '🥾', label: 'Higienização Botas/Aventais',   nivel: 2 },
  { fn: 'f05EntregaLimpos',                 icon: '📦', label: 'Entrega de Limpos',             nivel: 2 },
  { fn: 'f06EstoqueUniformesNovos',         icon: '👔', label: 'Estoque de Uniformes',          nivel: 4 },
  { fn: 'f07BaixaDescarte',                 icon: '🗑️', label: 'Baixa e Descarte',              nivel: 4 },
  { fn: 'f08GestaoReparos',                 icon: '🧵', label: 'Gestão de Reparos',             nivel: 2 },
  { fn: 'f09ControleTolhas',                icon: '🪣', label: 'Controle de Toalhas',           nivel: 2 },
  { fn: 'f10InventarioEnxoval',             icon: '📊', label: 'Inventário de Enxoval',         nivel: 4 },
  { fn: 'f11GestaoArmarios',               icon: '🔑', label: 'Gestão de Armários',            nivel: 3 },
  { fn: 'f12SolicitacaoCompraInsumos',      icon: '🛒', label: 'Compra de Insumos',             nivel: 4 },
  { fn: 'f13ControleEPIs',                  icon: '🦺', label: 'Controle de EPIs',              nivel: 4 },
  { fn: 'f14GerenciarSolicitacaoHigienizacao', icon: '📋', label: 'Solicitações',               nivel: 3 },
  { fn: 'f15VerEscala',                     icon: '📅', label: 'Ver Escala',                    nivel: 0 },
  { fn: 'f16GerenciarEscalas',              icon: '📆', label: 'Gerenciar Escalas',             nivel: 4 },
];

function _lav_statusBadge(s) {
  const m = {
    recebido: 'warning', em_triagem: 'info', em_lavagem: 'info',
    lavado: 'success', entregue: 'muted', cancelado: 'muted',
  };
  return `<span class="badge badge-${m[s]||'muted'}">${escapeHtml(s||'—')}</span>`;
}
function _fmtDT(v) {
  if (!v) return '—';
  try { return new Date(v).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); } catch { return '—'; }
}

async function loadStats() {
  try {
    const d = await API.get('/lavanderia/stats');
    const s = d.data || d;
    document.getElementById('stat-entradas').textContent    = s.entradasPendentes    ?? '—';
    document.getElementById('stat-ciclos').textContent      = s.ciclosAtivos          ?? '—';
    document.getElementById('stat-reparos').textContent     = s.reparosPendentes      ?? '—';
    document.getElementById('stat-solicitacoes').textContent= s.solicitacoesPendentes ?? '—';
    document.getElementById('stat-quimicos').textContent    = s.quimicosAbaixoMinimo  ?? '—';

    const bar = document.getElementById('lav-alerts');
    const chips = [];
    if (s.quimicosAbaixoMinimo > 0)   chips.push({ type: 'danger',  text: `${s.quimicosAbaixoMinimo} químico(s) abaixo do estoque mínimo` });
    if (s.entradasPendentes > 0)      chips.push({ type: 'warning', text: `${s.entradasPendentes} peça(s) aguardando triagem/lavagem` });
    if (s.solicitacoesPendentes > 0)  chips.push({ type: 'warning', text: `${s.solicitacoesPendentes} solicitação(ões) de higienização pendente(s)` });
    if (s.reparosPendentes > 0)       chips.push({ type: 'info',    text: `${s.reparosPendentes} peça(s) em reparo/costura` });
    if (s.ciclosAtivos > 0)           chips.push({ type: 'info',    text: `${s.ciclosAtivos} lote(s) de lavagem em andamento` });
    if (!chips.length)                chips.push({ type: 'success', text: 'Operação normal — nenhum alerta ativo' });
    bar.innerHTML = chips.map(c =>
      `<span class="lav-alert-chip ${c.type}">${c.type==='danger'?'🚨':c.type==='warning'?'⚠️':c.type==='info'?'ℹ️':'✅'} ${escapeHtml(c.text)}</span>`
    ).join('');
  } catch(err) { console.warn('Stats error:', err); }
}

function renderFunctions(user) {
  const grid = document.getElementById('lav-fn-grid');
  const visible = LAV_FUNCTIONS.filter(f => user.nivel_acesso >= f.nivel);
  if (!visible.length) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🔒</span><span class="empty-state-title">Nenhuma função disponível para seu nível de acesso</span></div>';
    return;
  }
  grid.innerHTML = visible.map(f =>
    `<button class="lav-fn-btn" data-fn="${escapeHtml(f.fn)}" title="${escapeHtml(f.label)}">
       <span class="lav-fn-icon">${f.icon}</span>
       <span>${escapeHtml(f.label)}</span>
     </button>`
  ).join('');
  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.lav-fn-btn');
    if (!btn) return;
    const fn = btn.getAttribute('data-fn');
    if (window.FuncoesLavanderia && typeof window.FuncoesLavanderia[fn] === 'function') {
      window.FuncoesLavanderia[fn]();
    }
  });
}

async function loadUltimasEntradas() {
  const wrap = document.getElementById('lav-entradas-wrap');
  try {
    const d = await API.get('/lavanderia/entradas?status=recebido');
    const rows = Array.isArray(d) ? d : (d.data || []);
    if (!rows.length) {
      wrap.innerHTML = '<div class="empty-state"><span class="empty-state-icon">✅</span><span class="empty-state-title">Nenhuma entrada pendente</span></div>';
      return;
    }
    wrap.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="table table-hover">
          <thead>
            <tr><th>Tipo</th><th>Funcionário</th><th>Setor</th><th>Sujeira</th><th>Área</th><th>Status</th><th>Entrada</th></tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${escapeHtml(r.tipo_item||'—')}</td>
                <td>${escapeHtml(r.funcionario_nome||'—')}</td>
                <td><span class="badge badge-muted">${escapeHtml(r.setor_nome||'—')}</span></td>
                <td><span class="badge badge-${r.nivel_sujeira==='pesado'?'danger':r.nivel_sujeira==='moderado'?'warning':'success'}">${escapeHtml(r.nivel_sujeira||'—')}</span></td>
                <td>${escapeHtml(r.tipo_area||'—')}</td>
                <td>${_lav_statusBadge(r.status)}</td>
                <td>${_fmtDT(r.created_at)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(err) {
    wrap.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><span class="empty-state-title">Erro: ${escapeHtml(err.message||'')}</span></div>`;
  }
}

async function onReady(user) {
  await Promise.all([loadStats(), loadUltimasEntradas()]);
  renderFunctions(user);
  document.getElementById('lav-refresh').addEventListener('click', () => Promise.all([loadStats(), loadUltimasEntradas()]));
}

initPage({
  title: 'Lavanderia',
  breadcrumb: ['Lavanderia'],
  requireNivel: 0,
  activeMenu: 'lavanderia',
  onReady,
});
</script>
</body>
</html>
