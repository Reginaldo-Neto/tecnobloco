<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frota — Tecnobloco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <style>
    /* ── Stat Grid ── */
    .mod-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-6);}
    @media(max-width:900px){.mod-stat-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:500px){.mod-stat-grid{grid-template-columns:1fr;}}
    .stat-card{display:block;position:relative;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:var(--space-4);transition:transform .2s,box-shadow .2s;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sc-a,#7c3aed),var(--sc-b,#a78bfa));}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);}
    .stat-card-title{font-size:var(--font-size-sm);color:var(--text-muted);font-weight:600;}
    .stat-card-icon{font-size:1.5rem;opacity:.8;}
    .stat-card-value{font-size:2.1rem;font-weight:800;color:var(--text-primary);margin-bottom:4px;line-height:1;}
    .stat-card-sub{font-size:var(--font-size-xs);color:var(--text-muted);}
    .stat-card.success{--sc-a:#22c55e;--sc-b:#4ade80;}.stat-card.success .stat-card-value{color:#4ade80;}
    .stat-card.warning{--sc-a:#f97316;--sc-b:#fb923c;}.stat-card.warning .stat-card-value{color:#fb923c;}
    .stat-card.danger{--sc-a:#ef4444;--sc-b:#f87171;}.stat-card.danger .stat-card-value{color:#f87171;}
    .stat-card.info{--sc-a:#3b82f6;--sc-b:#60a5fa;}.stat-card.info .stat-card-value{color:#60a5fa;}

    /* ── Function Grid ── */
    .mod-fn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:var(--space-3);}
    .mod-fn-btn{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:6px;padding:16px 10px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;
      color:var(--text-primary,#e2e8f0);
      font-size:0.78rem;font-weight:600;
      cursor:pointer;transition:all .18s;text-align:center;
      line-height:1.3;
    }
    .mod-fn-btn:hover{
      background:rgba(124,58,237,0.18);
      border-color:rgba(124,58,237,0.5);
      color:#fff;transform:translateY(-2px);
      box-shadow:0 4px 18px rgba(124,58,237,.25);
    }
    .mod-fn-btn:hover .mod-fn-icon{transform:scale(1.2);}
    .mod-fn-btn:active{transform:translateY(0);}
    .mod-fn-icon{font-size:1.6rem;transition:transform .18s;line-height:1;}

    /* ── Alert Banner ── */
    .frota-alerta-banner{
      display:flex;align-items:center;gap:var(--space-3);
      padding:var(--space-3) var(--space-4);
      background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
      border-radius:var(--radius-md);margin-bottom:var(--space-4);
      font-size:var(--font-size-sm);color:#fca5a5;
    }
    .frota-alerta-banner button{margin-left:auto;}
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="topbar-container"></div>
  <main class="main-content" id="main-content">
      <!-- Banner de alertas (carregado dinamicamente) -->
      <div id="frota-alertas-banner" style="display:none" class="frota-alerta-banner">
        <span>🚨</span>
        <span id="frota-alertas-texto"></span>
        <button class="btn btn-sm btn-danger" onclick="if(window.FuncoesFrotas) FuncoesFrotas.f29PainelAlertas()">Ver Detalhes</button>
      </div>

      <!-- Stat Cards -->
      <div class="mod-stat-grid">
        <div class="stat-card success">
          <div class="stat-card-header"><span class="stat-card-title">Disponíveis</span><span class="stat-card-icon">🚗</span></div>
          <div class="stat-card-value" id="stat-disponiveis">—</div>
          <div class="stat-card-sub">prontos para uso</div>
        </div>
        <div class="stat-card info">
          <div class="stat-card-header"><span class="stat-card-title">Em Uso</span><span class="stat-card-icon">🚌</span></div>
          <div class="stat-card-value" id="stat-em-uso">—</div>
          <div class="stat-card-sub">veículos em viagem</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-card-header"><span class="stat-card-title">Manutenções Abertas</span><span class="stat-card-icon">🔧</span></div>
          <div class="stat-card-value" id="stat-manutencoes">—</div>
          <div class="stat-card-sub">aguardando execução</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header"><span class="stat-card-title">Viagens Hoje</span><span class="stat-card-icon">📍</span></div>
          <div class="stat-card-value" id="stat-viagens">—</div>
          <div class="stat-card-sub">realizadas no dia</div>
        </div>
      </div>

      <!-- Funções do Setor -->
      <div class="content-card" style="margin-bottom:var(--space-5);">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <h3 class="card-title">Funções do Setor</h3>
          <span id="fn-count" style="font-size:.8rem;color:var(--text-muted)"></span>
        </div>
        <div class="mod-fn-grid" id="mod-fn-grid"><div class="page-loader"><span class="spinner"></span></div></div>
      </div>

      <!-- Viagens Recentes -->
      <div class="content-card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <h3 class="card-title">Viagens Recentes</h3>
          <button class="btn btn-sm btn-outline-secondary" id="mod-refresh">↻ Atualizar</button>
        </div>
        <div id="mod-list"><div class="page-loader"><span class="spinner"></span></div></div>
      </div>
  </main>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/funcoes/_core.js"></script>
<script src="../../assets/js/funcoes/global_forms.js"></script>
<script src="../../assets/js/funcoes/frotas_forms.js"></script>
<script src="../../assets/js/funcoes/frotas.js"></script>
<script>
'use strict';
const FRO_FUNCTIONS = [
  // ── Spec f01–f28 (funções principais do setor) ─────────────────────────────
  { fn: 'f01VerEscala',                  icon: '📅', label: 'Ver Escala',              nivel: 0 },
  { fn: 'f02GerenciarFrota',             icon: '🚗', label: 'Gerenciar Frota',         nivel: 4 },
  { fn: 'f03EscalaUsoVeiculos',          icon: '📆', label: 'Escala de Veículos',      nivel: 4 },
  { fn: 'f04GestaoMotoristas',           icon: '👤', label: 'Motoristas / CNH',        nivel: 4 },
  { fn: 'f05RotasColeta',                icon: '🛣️', label: 'Rotas de Coleta',         nivel: 4 },
  { fn: 'f06ConsumoVeiculos',            icon: '⛽', label: 'Consumo',                 nivel: 3 },
  { fn: 'f07DepreciacaoVeiculos',        icon: '📉', label: 'Depreciação',             nivel: 5 },
  { fn: 'f08RotaEntrega',                icon: '📦', label: 'Rotas de Entrega',        nivel: 4 },
  { fn: 'f09SolicitacaoUsoVeiculos',     icon: '🔑', label: 'Solicitação de Uso',      nivel: 4 },
  { fn: 'f10LocalizacaoMotoristas',      icon: '📍', label: 'Localização',             nivel: 3 },
  { fn: 'f11DadosCaminhoes',             icon: '🔩', label: 'Dados Técnicos',          nivel: 3 },
  { fn: 'f12PlanoManutencaoPreventiva',  icon: '📋', label: 'Plano Preventiva',        nivel: 4 },
  { fn: 'f13HistoricoManutencaoCorretiva', icon: '🔧', label: 'Manutenção Corretiva', nivel: 3 },
  { fn: 'f14GestaoPneus',                icon: '🔄', label: 'Gestão de Pneus',        nivel: 3 },
  { fn: 'f15ManutencaoRefrigeracao',     icon: '❄️', label: 'Refrigeração',            nivel: 3 },
  { fn: 'f16HigienizacaoTanques',        icon: '🧴', label: 'Higienização Tanques',   nivel: 3 },
  { fn: 'f17ControleAbastecimento',      icon: '⛽', label: 'Abastecimento',           nivel: 2 },
  { fn: 'f18GestaoMultas',               icon: '🚦', label: 'Multas',                 nivel: 4 },
  { fn: 'f19ControlePedagios',           icon: '🛣️', label: 'Pedágios',               nivel: 2 },
  { fn: 'f20ChecklistSaidaRetorno',      icon: '✅', label: 'Checklist',              nivel: 2 },
  { fn: 'f21RegistroSinistros',          icon: '🚨', label: 'Sinistros',              nivel: 4 },
  { fn: 'f22QualidadeLeiteProdutor',     icon: '📦', label: 'Qualidade Materiais',        nivel: 4 },
  { fn: 'f23TanquesComunItarios',        icon: '🏭', label: 'Tanques Comunitários',   nivel: 4 },
  { fn: 'f24HistoricoCaptacao',          icon: '📊', label: 'Histórico Captação',     nivel: 4 },
  { fn: 'f25CapturaPesagem',             icon: '⚖️', label: 'Captura Pesagem',        nivel: 2 },
  { fn: 'f26ConfDivergenciaPeso',        icon: '⚠️', label: 'Divergência Peso',       nivel: 4 },
  { fn: 'f27ExecucaoRotaColeta',         icon: '🚛', label: 'Executar Coleta',        nivel: 2 },
  { fn: 'f28ExecucaoRotaEntrega',        icon: '📦', label: 'Executar Entrega',       nivel: 2 },
  { fn: 'f29PainelAlertas',             icon: '🚨', label: 'Painel de Alertas',       nivel: 3 },
  { fn: 'f30RelatorioCustos',           icon: '💰', label: 'Relatório de Custos',     nivel: 4 },
  // ── Aliases do setor (usados no dashboard) ──────────────────────────────────
  { fn: 'f02GerenciarVeiculos',          icon: '🚗', label: 'Veículos',               nivel: 4 },
  { fn: 'f03RegistrarViagem',            icon: '📍', label: 'Registrar Viagem',       nivel: 3 },
  { fn: 'f03bHistoricoViagens',          icon: '📋', label: 'Histórico Viagens',      nivel: 3 },
  { fn: 'f04FinalizarViagem',            icon: '🏁', label: 'Finalizar Viagem',       nivel: 3 },
  { fn: 'f05Abastecimento',              icon: '⛽', label: 'Abastecimentos',          nivel: 3 },
  { fn: 'f06Manutencao',                 icon: '🔧', label: 'Manutenções',             nivel: 3 },
  { fn: 'f07Multas',                     icon: '🚦', label: 'Multas',                 nivel: 4 },
  { fn: 'f08Checklist',                  icon: '✅', label: 'Checklist',              nivel: 3 },
  { fn: 'f09GerenciarEscalas',           icon: '📆', label: 'Gerenciar Escalas',      nivel: 4 },
];

async function loadStats() {
  try {
    const d = await API.get('/frota/stats');
    const s = d.data || d;
    document.getElementById('stat-disponiveis').textContent = s.veiculosDisponiveis ?? '—';
    document.getElementById('stat-em-uso').textContent      = s.veiculosEmUso ?? '—';
    document.getElementById('stat-manutencoes').textContent = s.manutencoesPendentes ?? '—';
    document.getElementById('stat-viagens').textContent     = s.viagensHoje ?? '—';
    // Cor dinâmica para stat-manutencoes
    const cardMnt = document.getElementById('stat-manutencoes').closest('.stat-card');
    if (s.manutencoesPendentes > 5) cardMnt.className = 'stat-card danger';
    else if (s.manutencoesPendentes > 0) cardMnt.className = 'stat-card warning';
    else cardMnt.className = 'stat-card success';
  } catch(e) { console.warn('stats', e); }
}

async function loadAlertas() {
  try {
    const d = await API.get('/frota/alertas');
    if (!d.success) return;
    const r = d.data.resumo;
    const criticos = r.cnh_vencidas + r.toxicologico_vencido + r.preventivas_vencidas + r.sinistros_abertos;
    const banner = document.getElementById('frota-alertas-banner');
    if (criticos > 0) {
      const partes = [];
      if (r.cnh_vencidas)         partes.push(`${r.cnh_vencidas} CNH vencida(s)`);
      if (r.toxicologico_vencido) partes.push(`${r.toxicologico_vencido} toxicológico(s) vencido(s)`);
      if (r.preventivas_vencidas) partes.push(`${r.preventivas_vencidas} preventiva(s) vencida(s)`);
      if (r.sinistros_abertos)    partes.push(`${r.sinistros_abertos} sinistro(s) em aberto`);
      document.getElementById('frota-alertas-texto').textContent = `Atenção: ${partes.join(' · ')}`;
      banner.style.display = 'flex';
    }
  } catch(e) { /* silencioso */ }
}

const _STATUS_BADGE = {
  concluida: 'bg-success', em_andamento: 'bg-info', agendada: 'bg-warning text-dark', cancelada: 'bg-secondary'
};

async function loadRecentes() {
  const wrap = document.getElementById('mod-list');
  try {
    const d = await API.get('/frota/recentes');
    const rows = Array.isArray(d) ? d : (d.data || []);
    if (!rows.length) { wrap.innerHTML = '<div class="empty-state"><span class="empty-state-icon">📭</span><span class="empty-state-title">Nenhuma viagem registrada</span></div>'; return; }
    wrap.innerHTML = `<div style="overflow-x:auto;"><table class="table table-hover">
      <thead><tr><th>Placa</th><th>Motorista</th><th>Destino</th><th>Saída</th><th>KM</th><th>Status</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td><code>${escapeHtml(r.placa||'—')}</code></td>
        <td>${escapeHtml(r.motorista_nome||'—')}</td>
        <td>${escapeHtml(r.destino||'—')}</td>
        <td style="white-space:nowrap">${r.data_saida ? new Date(r.data_saida).toLocaleDateString('pt-BR') : '—'}</td>
        <td>${r.km_saida ? Number(r.km_saida).toLocaleString('pt-BR') + ' km' : '—'}</td>
        <td><span class="badge ${_STATUS_BADGE[r.status]||'bg-secondary'}">${escapeHtml(r.status||'—')}</span></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch(e) { wrap.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><span class="empty-state-title">${escapeHtml(e.message||'Erro')}</span></div>`; }
}

function renderFunctions(user) {
  const grid = document.getElementById('mod-fn-grid');
  const vis = FRO_FUNCTIONS.filter(f => user.nivel_acesso >= f.nivel);
  const contador = document.getElementById('fn-count');
  if (contador) contador.textContent = `${vis.length} função(ões) disponível(eis)`;
  if (!vis.length) { grid.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🔒</span><span class="empty-state-title">Nenhuma função disponível</span></div>'; return; }
  grid.innerHTML = vis.map(f=>`<button class="mod-fn-btn" data-fn="${escapeHtml(f.fn)}" title="${escapeHtml(f.label)}"><span class="mod-fn-icon">${f.icon}</span><span>${escapeHtml(f.label)}</span></button>`).join('');
  grid.addEventListener('click', e=>{
    const btn = e.target.closest('.mod-fn-btn'); if (!btn) return;
    const fn = btn.getAttribute('data-fn');
    if (window.FuncoesFrotas && typeof window.FuncoesFrotas[fn]==='function') window.FuncoesFrotas[fn]();
  });
}

async function onReady(user) {
  await Promise.all([loadStats(), loadRecentes(), loadAlertas()]);
  renderFunctions(user);
  document.getElementById('mod-refresh').addEventListener('click', loadRecentes);
}

initPage({ title:'Frota', breadcrumb:['Frota'], requireNivel:3, activeMenu:'frota', onReady });
</script>
</body>
</html>
