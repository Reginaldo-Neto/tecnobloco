<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviços Gerais — Tecnobloco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <style>
    .sg-stat-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    @media (max-width: 1100px) { .sg-stat-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px)  { .sg-stat-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 450px)  { .sg-stat-grid { grid-template-columns: 1fr; } }

    .sg-fn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: var(--space-3);
    }
    .sg-fn-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: var(--space-2);
      padding: var(--space-4) var(--space-3);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      cursor: pointer; text-align: center;
      transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
    }
    .sg-fn-btn:hover {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.3);
      color: var(--text-primary);
      transform: translateY(-1px);
    }
    .sg-fn-icon { font-size: 22px; }

    .sg-alert-bar { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-5); }
    .sg-alert-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px;
      font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
    }
    .sg-alert-chip.danger  { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .sg-alert-chip.warning { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
    .sg-alert-chip.info    { background: rgba(59,130,246,0.12);  color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .sg-alert-chip.success { background: rgba(34,197,94,0.12);   color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

    .stat-card{display:block;position:relative;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:var(--space-4);transition:transform .2s,box-shadow .2s;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sc-a,#7c3aed),var(--sc-b,#a78bfa));}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);}
    .stat-card-title{font-size:var(--font-size-sm);color:var(--text-muted);font-weight:600;}
    .stat-card-icon{font-size:1.5rem;opacity:.8;}
    .stat-card-value{font-size:2.1rem;font-weight:800;color:var(--text-primary);margin-bottom:4px;line-height:1;}
    .stat-card-sub{font-size:var(--font-size-xs);color:var(--text-muted);}
    .stat-card.success{--sc-a:#22c55e;--sc-b:#4ade80;}.stat-card.success .stat-card-value{color:#4ade80;}
    .stat-card.warning{--sc-a:#f97316;--sc-b:#fb923c;}.stat-card.warning .stat-card-value{color:#fb923c;}
    .stat-card.danger{--sc-a:#ef4444;--sc-b:#f87171;}.stat-card.danger .stat-card-value{color:#f87171;}
    .stat-card.info{--sc-a:#3b82f6;--sc-b:#60a5fa;}.stat-card.info .stat-card-value{color:#60a5fa;}
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="topbar-container"></div>
  <main class="main-content" id="main-content">

      <!-- Alerts -->
      <div id="sg-alerts" class="sg-alert-bar"></div>

      <!-- Stats -->
      <div class="sg-stat-grid">
        <div class="stat-card warning">
          <div class="stat-card-header"><span class="stat-card-title">Atividades Pendentes</span><span class="stat-card-icon">🛠️</span></div>
          <div class="stat-card-value" id="stat-atividades">—</div>
          <div class="stat-card-sub">planejadas ou em andamento</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-card-header"><span class="stat-card-title">Solicitações Pendentes</span><span class="stat-card-icon">📋</span></div>
          <div class="stat-card-value" id="stat-solicitacoes">—</div>
          <div class="stat-card-sub">pedidos de apoio</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-card-header"><span class="stat-card-title">Insumos em Falta</span><span class="stat-card-icon">⛽</span></div>
          <div class="stat-card-value" id="stat-insumos">—</div>
          <div class="stat-card-sub">abaixo do estoque mínimo</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-card-header"><span class="stat-card-title">Ferramentas Extraviadas</span><span class="stat-card-icon">🔧</span></div>
          <div class="stat-card-value" id="stat-ferramentas">—</div>
          <div class="stat-card-sub">extravios registrados</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-card-header"><span class="stat-card-title">Pendências Auditoria</span><span class="stat-card-icon">📌</span></div>
          <div class="stat-card-value" id="stat-auditoria">—</div>
          <div class="stat-card-sub">itens em aberto</div>
        </div>
      </div>

      <!-- Function grid -->
      <div class="content-card" style="margin-bottom:var(--space-5);">
        <div class="card-header">
          <h3 class="card-title">Funções do Setor</h3>
        </div>
        <div class="sg-fn-grid" id="sg-fn-grid">
          <div class="page-loader"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Recent activities -->
      <div class="content-card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <h3 class="card-title">Últimas Atividades</h3>
          <button class="btn btn-sm btn-secondary" id="sg-refresh">↻ Atualizar</button>
        </div>
        <div id="sg-atividades-wrap">
          <div class="page-loader"><span class="spinner"></span></div>
        </div>
      </div>

  </main>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/funcoes/_core.js"></script>
<script src="../../assets/js/funcoes/global_forms.js"></script>
<script src="../../assets/js/funcoes/servicos-gerais_forms.js"></script>
<script src="../../assets/js/funcoes/servicos-gerais.js"></script>
<script>
'use strict';

const SG_FUNCTIONS = [
  { fn: 'f01CronogramaJardinagem',       icon: '🌿', label: 'Cronograma Jardinagem',    nivel: 4 },
  { fn: 'f02ControleErvasDaninhas',      icon: '🌾', label: 'Ervas Daninhas',           nivel: 3 },
  { fn: 'f03ManutencaoCercas',           icon: '🚧', label: 'Manutenção de Cercas',     nivel: 2 },
  { fn: 'f04LimpezaAreasExternas',       icon: '🧹', label: 'Limpeza Ext.',             nivel: 2 },
  { fn: 'f05PequenosReparosAlvenaria',   icon: '🧱', label: 'Reparos Alvenaria',        nivel: 3 },
  { fn: 'f06PinturaPredial',             icon: '🎨', label: 'Pintura Predial',          nivel: 3 },
  { fn: 'f07LimpezaCalhasTelhados',      icon: '🏚️', label: 'Calhas e Telhados',        nivel: 2 },
  { fn: 'f08LimpezaCaixasAgua',          icon: '💧', label: 'Caixas d\'Água',           nivel: 3 },
  { fn: 'f09LimpezaCaixasGordura',       icon: '🪣', label: 'Caixas de Gordura',        nivel: 2 },
  { fn: 'f10LavagemHidrojateamento',     icon: '💦', label: 'Hidrojateamento',           nivel: 2 },
  { fn: 'f11ControlePragas',             icon: '🐀', label: 'Controle de Pragas',       nivel: 2 },
  { fn: 'f12ControleFerramenta',         icon: '🔧', label: 'Ferramentas',              nivel: 4 },
  { fn: 'f13ControleInsumosCombustivel', icon: '⛽', label: 'Insumos/Combustível',      nivel: 4 },
  { fn: 'f14VerSolicitacoesApoio',       icon: '📋', label: 'Ver Solicitações',         nivel: 2 },
  { fn: 'f15VerEscala',                  icon: '📅', label: 'Ver Escala',               nivel: 0 },
  { fn: 'f16GerenciarSolicitacoesApoio', icon: '📌', label: 'Gerenciar Solicitações',   nivel: 4 },
  { fn: 'f17PendenciasAuditoria',        icon: '⚠️', label: 'Pendências Auditoria',     nivel: 4 },
  { fn: 'f18DefinirCronogramaJardinagem',icon: '📆', label: 'Definir Cronograma',       nivel: 4 },
  { fn: 'f19GerenciarEscalas',           icon: '🗓️', label: 'Gerenciar Escalas',        nivel: 4 },
];

function _sg_statusBadge(s) {
  const m = {
    planejado: 'info', em_andamento: 'warning', concluido: 'success', cancelado: 'muted',
    agendado: 'info',
  };
  return `<span class="badge badge-${m[s]||'muted'}">${escapeHtml(s||'—')}</span>`;
}
function _fmtDT(v) {
  if (!v) return '—';
  try { return new Date(v).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); } catch { return '—'; }
}

async function loadStats() {
  try {
    const d = await API.get('/servicos-gerais/stats');
    const s = d.data || d;
    document.getElementById('stat-atividades').textContent   = s.atividadesPendentes   ?? '—';
    document.getElementById('stat-solicitacoes').textContent = s.solicitacoesPendentes ?? '—';
    document.getElementById('stat-insumos').textContent      = s.insumosAbaixoMinimo   ?? '—';
    document.getElementById('stat-ferramentas').textContent  = s.ferramentasExtravios  ?? '—';
    document.getElementById('stat-auditoria').textContent    = s.pendenciasAuditoria   ?? '—';

    const bar = document.getElementById('sg-alerts');
    const chips = [];
    if (s.ferramentasExtravios > 0)  chips.push({ type: 'danger',  text: `${s.ferramentasExtravios} ferramenta(s) extraviada(s)` });
    if (s.insumosAbaixoMinimo > 0)   chips.push({ type: 'danger',  text: `${s.insumosAbaixoMinimo} insumo(s) abaixo do mínimo` });
    if (s.pendenciasAuditoria > 0)   chips.push({ type: 'warning', text: `${s.pendenciasAuditoria} pendência(s) de auditoria em aberto` });
    if (s.solicitacoesPendentes > 0) chips.push({ type: 'warning', text: `${s.solicitacoesPendentes} solicitação(ões) de apoio pendente(s)` });
    if (s.atividadesPendentes > 0)   chips.push({ type: 'info',    text: `${s.atividadesPendentes} atividade(s) em andamento` });
    if (!chips.length)               chips.push({ type: 'success', text: 'Operação normal — nenhum alerta ativo' });
    bar.innerHTML = chips.map(c =>
      `<span class="sg-alert-chip ${c.type}">${c.type==='danger'?'🚨':c.type==='warning'?'⚠️':c.type==='info'?'ℹ️':'✅'} ${escapeHtml(c.text)}</span>`
    ).join('');
  } catch(err) { console.warn('Stats error:', err); }
}

function renderFunctions(user) {
  const grid = document.getElementById('sg-fn-grid');
  const visible = SG_FUNCTIONS.filter(f => user.nivel_acesso >= f.nivel);
  if (!visible.length) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🔒</span><span class="empty-state-title">Nenhuma função disponível para seu nível de acesso</span></div>';
    return;
  }
  grid.innerHTML = visible.map(f =>
    `<button class="sg-fn-btn" data-fn="${escapeHtml(f.fn)}" title="${escapeHtml(f.label)}">
       <span class="sg-fn-icon">${f.icon}</span>
       <span>${escapeHtml(f.label)}</span>
     </button>`
  ).join('');
  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.sg-fn-btn');
    if (!btn) return;
    const fn = btn.getAttribute('data-fn');
    if (window.FuncoesServicosGerais && typeof window.FuncoesServicosGerais[fn] === 'function') {
      window.FuncoesServicosGerais[fn]();
    }
  });
}

async function loadUltimasAtividades() {
  const wrap = document.getElementById('sg-atividades-wrap');
  try {
    const d = await API.get('/servicos-gerais/atividades');
    const rows = Array.isArray(d) ? d : (d.data || []);
    if (!rows.length) {
      wrap.innerHTML = '<div class="empty-state"><span class="empty-state-icon">✅</span><span class="empty-state-title">Nenhuma atividade registrada</span></div>';
      return;
    }
    wrap.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="table table-hover">
          <thead>
            <tr><th>Tipo</th><th>Título</th><th>Local</th><th>Responsável</th><th>Data</th><th>Status</th></tr>
          </thead>
          <tbody>
            ${rows.slice(0,15).map(r => `
              <tr>
                <td><span class="badge badge-muted">${escapeHtml(r.tipo||'—')}</span></td>
                <td>${escapeHtml(r.titulo||'—')}</td>
                <td>${escapeHtml(r.local||'—')}</td>
                <td>${escapeHtml(r.responsavel_exibir||'—')}</td>
                <td>${escapeHtml(r.data_execucao||'—')}</td>
                <td>${_sg_statusBadge(r.status)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(err) {
    wrap.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><span class="empty-state-title">Erro: ${escapeHtml(err.message||'')}</span></div>`;
  }
}

async function onReady(user) {
  await Promise.all([loadStats(), loadUltimasAtividades()]);
  renderFunctions(user);
  document.getElementById('sg-refresh').addEventListener('click', () => Promise.all([loadStats(), loadUltimasAtividades()]));
}

initPage({
  title: 'Serviços Gerais',
  breadcrumb: ['Serviços Gerais'],
  requireNivel: 0,
  activeMenu: 'servicos-gerais',
  onReady,
});
</script>
</body>
</html>
