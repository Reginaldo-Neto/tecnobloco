<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qualidade — Tecnobloco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <style>
    .mod-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-6);}
    @media(max-width:900px){.mod-stat-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:500px){.mod-stat-grid{grid-template-columns:1fr;}}
    .mod-fn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:var(--space-3);}
    .mod-fn-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-2);padding:var(--space-4) var(--space-3);background:rgba(255,255,255,0.03);border:1px solid var(--border-color);border-radius:var(--border-radius);color:var(--text-secondary);font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);cursor:pointer;transition:all var(--transition);text-align:center;}
    .mod-fn-btn:hover{background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.3);color:var(--text-primary);transform:translateY(-1px);}
    .mod-fn-icon{font-size:22px;}
    .stat-card{display:block;position:relative;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:var(--space-4);transition:transform .2s,box-shadow .2s;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sc-a,#7c3aed),var(--sc-b,#a78bfa));}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);}
    .stat-card-title{font-size:var(--font-size-sm);color:var(--text-muted);font-weight:600;}
    .stat-card-icon{font-size:1.5rem;opacity:.8;}
    .stat-card-value{font-size:2.1rem;font-weight:800;color:var(--text-primary);margin-bottom:4px;line-height:1;}
    .stat-card-sub{font-size:var(--font-size-xs);color:var(--text-muted);}
    .stat-card.success{--sc-a:#22c55e;--sc-b:#4ade80;}.stat-card.success .stat-card-value{color:#4ade80;}
    .stat-card.warning{--sc-a:#f97316;--sc-b:#fb923c;}.stat-card.warning .stat-card-value{color:#fb923c;}
    .stat-card.danger{--sc-a:#ef4444;--sc-b:#f87171;}.stat-card.danger .stat-card-value{color:#f87171;}
    .stat-card.info{--sc-a:#3b82f6;--sc-b:#60a5fa;}.stat-card.info .stat-card-value{color:#60a5fa;}
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="topbar-container"></div>
  <main class="main-content" id="main-content">
      <div class="mod-stat-grid">
        <div class="stat-card warning"><div class="stat-card-header"><span class="stat-card-title">Laudos Pendentes</span><span>🔬</span></div><div class="stat-card-value" id="stat-laudos">—</div><div class="stat-card-sub">aguardando liberação</div></div>
        <div class="stat-card danger"><div class="stat-card-header"><span class="stat-card-title">NCs Abertas</span><span>⚠️</span></div><div class="stat-card-value" id="stat-nc">—</div><div class="stat-card-sub">não conformidades</div></div>
        <div class="stat-card"><div class="stat-card-header"><span class="stat-card-title">Análises Hoje</span><span>📋</span></div><div class="stat-card-value" id="stat-analises">—</div><div class="stat-card-sub">realizadas no dia</div></div>
        <div class="stat-card danger"><div class="stat-card-header"><span class="stat-card-title">Reprovados Hoje</span><span>❌</span></div><div class="stat-card-value" id="stat-reprovados">—</div><div class="stat-card-sub">análises reprovadas</div></div>
      </div>
      <div class="content-card" style="margin-bottom:var(--space-5);">
        <div class="card-header"><h3 class="card-title">Funções do Setor</h3></div>
        <div class="mod-fn-grid" id="mod-fn-grid"><div class="page-loader"><span class="spinner"></span></div></div>
      </div>
      <div class="content-card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <h3 class="card-title">Laudos Recentes</h3>
          <button class="btn btn-sm btn-secondary" id="mod-refresh">↻ Atualizar</button>
        </div>
        <div id="mod-list"><div class="page-loader"><span class="spinner"></span></div></div>
      </div>
  </main>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/funcoes/_core.js"></script>
<script src="../../assets/js/funcoes/global_forms.js"></script>
<script src="../../assets/js/funcoes/qualidade_forms.js"></script>
<script src="../../assets/js/funcoes/qualidade.js"></script>
<script>
'use strict';
const QUA_FUNCTIONS = [
  { fn: 'f01AnaliseRecepcao',    icon: '🥛', label: 'Análise Recepção',      nivel: 2 },
  { fn: 'f02AnalisesFQ',         icon: '⚗️', label: 'Análises Fís-Quím.',    nivel: 3 },
  { fn: 'f03AnalisesMicro',      icon: '🦠', label: 'Análises Micro.',        nivel: 3 },
  { fn: 'f04Antibioticos',       icon: '💊', label: 'Antibióticos',           nivel: 3 },
  { fn: 'f05LiberacaoLotes',     icon: '✅', label: 'Liberação de Lotes',     nivel: 4 },
  { fn: 'f06NaoConformidades',   icon: '⚠️', label: 'Não Conformidades',      nivel: 3 },
  { fn: 'f07AnaliseSensorial',   icon: '👅', label: 'Análise Sensorial',      nivel: 3 },
  { fn: 'f08ShelfLife',          icon: '📅', label: 'Shelf-Life',             nivel: 2 },
  { fn: 'f09Laudos',             icon: '🔬', label: 'Laudos Técnicos',        nivel: 3 },
  { fn: 'f10AmostrasRetencao',   icon: '🧪', label: 'Amostras Retenção',      nivel: 2 },
  { fn: 'f11ControleAguas',      icon: '💧', label: 'Águas e Efluentes',      nivel: 3 },
  { fn: 'f12SwabTest',           icon: '🧹', label: 'Swab Test',              nivel: 2 },
  { fn: 'f13ControlePragas',     icon: '🐀', label: 'Controle de Pragas',     nivel: 3 },
  { fn: 'f14Reagentes',          icon: '🧴', label: 'Est. Reagentes',         nivel: 3 },
  { fn: 'f15Calibracoes',        icon: '⚙️', label: 'Calibrações',            nivel: 3 },
  { fn: 'f16VerEscala',          icon: '🗓️', label: 'Ver Escala',             nivel: 0 },
  { fn: 'f17SolicitarReanalise', icon: '🔄', label: 'Solicitar Reanálise',    nivel: 3 },
  { fn: 'f18GerenciarReanalises',icon: '📋', label: 'Gerir Reanálises',       nivel: 4 },
  { fn: 'f19EstocagemMP',        icon: '📦', label: 'Estocagem MP',           nivel: 3 },
  { fn: 'f20VisitasFiscais',     icon: '🏛️', label: 'Visitas Fiscais',        nivel: 4 },
  { fn: 'f21CargaSpot',          icon: '🚛', label: 'Carga Spot',             nivel: 4 },
  { fn: 'f22GerenciarEscalas',   icon: '📆', label: 'Gerir Escalas',          nivel: 4 },
];

async function loadStats() {
  try {
    const d = await API.get('/qualidade/stats');
    if (!d || !d.success) return;
    const s = d.data;
    document.getElementById('stat-laudos').textContent     = s.laudosPendentes ?? '—';
    document.getElementById('stat-nc').textContent         = s.ncAbertas        ?? '—';
    document.getElementById('stat-analises').textContent   = s.analisesHoje     ?? '—';
    document.getElementById('stat-reprovados').textContent = s.reprovadosHoje   ?? '—';
  } catch(e) { console.warn('stats', e); }
}

async function loadRecentes() {
  const wrap = document.getElementById('mod-list');
  try {
    const d = await API.get('/qualidade/recentes');
    if (!d || !d.success) { wrap.innerHTML = _empty('Erro ao carregar laudos recentes.'); return; }
    const rows = d.data || [];
    if (!rows.length) { wrap.innerHTML = _empty('Nenhum laudo recente.'); return; }
    wrap.innerHTML = `<div style="overflow-x:auto;"><table class="table table-hover"><thead><tr>
      <th>Produto</th><th>Lote</th><th>Resultado</th><th>Analista</th><th>Data</th>
    </tr></thead><tbody>${rows.map(r => `<tr>
      <td>${escapeHtml(r.produto_nome || '—')}</td>
      <td>${escapeHtml(r.lote || '—')}</td>
      <td>${_badge(r.resultado)}</td>
      <td>${escapeHtml(r.analista_nome || '—')}</td>
      <td>${_fmtDate(r.criado_em)}</td>
    </tr>`).join('')}</tbody></table></div>`;
  } catch(e) { wrap.innerHTML = _empty('Erro ao carregar laudos recentes.'); }
}

function renderFunctions(user) {
  const grid = document.getElementById('mod-fn-grid');
  const vis = QUA_FUNCTIONS.filter(f => user.nivel_acesso >= f.nivel);
  if (!vis.length) { grid.innerHTML = _empty('Nenhuma função disponível para seu nível de acesso.'); return; }
  grid.innerHTML = vis.map(f =>
    `<button class="mod-fn-btn" data-fn="${escapeHtml(f.fn)}">
      <span class="mod-fn-icon">${f.icon}</span>
      <span>${escapeHtml(f.label)}</span>
    </button>`
  ).join('');
  grid.addEventListener('click', e => {
    const btn = e.target.closest('.mod-fn-btn'); if (!btn) return;
    const fn = btn.getAttribute('data-fn');
    if (window.FuncoesQualidade && typeof window.FuncoesQualidade[fn] === 'function') {
      window.FuncoesQualidade[fn]();
    }
  });
}

async function onReady(user) {
  await Promise.all([loadStats(), loadRecentes()]);
  renderFunctions(user);
  document.getElementById('mod-refresh').addEventListener('click', loadRecentes);
}

initPage({ title: 'Qualidade', breadcrumb: ['Qualidade'], requireNivel: 2, activeMenu: 'qualidade', onReady });
</script>
</body>
</html>
