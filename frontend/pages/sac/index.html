<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAC — Tecnobloco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <style>
    .sac-stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    @media (max-width: 900px) { .sac-stat-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .sac-stat-grid { grid-template-columns: 1fr; } }

    .sac-fn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: var(--space-3);
    }
    .sac-fn-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-3);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
      text-align: center;
    }
    .sac-fn-btn:hover {
      background: rgba(16,185,129,0.1);
      border-color: rgba(16,185,129,0.3);
      color: var(--text-primary);
      transform: translateY(-1px);
    }
    .sac-fn-icon { font-size: 22px; }

    .sac-alert-bar {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-5);
    }
    .sac-alert-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
    }
    .sac-alert-chip.danger  { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .sac-alert-chip.warning { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
    .sac-alert-chip.info    { background: rgba(59,130,246,0.12);  color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .sac-alert-chip.success { background: rgba(34,197,94,0.12);   color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

    .stat-card{display:block;position:relative;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:var(--space-4);transition:transform .2s,box-shadow .2s;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sc-a,#7c3aed),var(--sc-b,#a78bfa));}
    .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .stat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2);}
    .stat-card-title{font-size:var(--font-size-sm);color:var(--text-muted);font-weight:600;}
    .stat-card-icon{font-size:1.5rem;opacity:.8;}
    .stat-card-value{font-size:2.1rem;font-weight:800;color:var(--text-primary);margin-bottom:4px;line-height:1;}
    .stat-card-sub{font-size:var(--font-size-xs);color:var(--text-muted);}
    .stat-card.success{--sc-a:#22c55e;--sc-b:#4ade80;}.stat-card.success .stat-card-value{color:#4ade80;}
    .stat-card.warning{--sc-a:#f97316;--sc-b:#fb923c;}.stat-card.warning .stat-card-value{color:#fb923c;}
    .stat-card.danger{--sc-a:#ef4444;--sc-b:#f87171;}.stat-card.danger .stat-card-value{color:#f87171;}
    .stat-card.info{--sc-a:#3b82f6;--sc-b:#60a5fa;}.stat-card.info .stat-card-value{color:#60a5fa;}
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div id="topbar-container"></div>
  <main class="main-content" id="main-content">

      <!-- Alerts -->
      <div id="sac-alerts" class="sac-alert-bar"></div>

      <!-- Stats -->
      <div class="sac-stat-grid" id="sac-stats">
        <div class="stat-card warning">
          <div class="stat-card-header">
            <span class="stat-card-title">Tickets Abertos</span>
            <span class="stat-card-icon">🎟️</span>
          </div>
          <div class="stat-card-value" id="stat-tickets-abertos">—</div>
          <div class="stat-card-sub">abertos / em análise</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-card-header">
            <span class="stat-card-title">Tickets Urgentes/Altos</span>
            <span class="stat-card-icon">🚨</span>
          </div>
          <div class="stat-card-value" id="stat-tickets-urgentes">—</div>
          <div class="stat-card-sub">alta prioridade em aberto</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-card-header">
            <span class="stat-card-title">Recalls Ativos</span>
            <span class="stat-card-icon">⚠️</span>
          </div>
          <div class="stat-card-value" id="stat-recalls-ativos">—</div>
          <div class="stat-card-sub">em andamento</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-card-title">Atendimentos Hoje</span>
            <span class="stat-card-icon">📞</span>
          </div>
          <div class="stat-card-value" id="stat-atendimentos-hoje">—</div>
          <div class="stat-card-sub">registrados no dia</div>
        </div>
      </div>

      <!-- Function grid -->
      <div class="content-card" style="margin-bottom:var(--space-5);">
        <div class="card-header">
          <h3 class="card-title">Funções do Setor</h3>
        </div>
        <div class="sac-fn-grid" id="sac-fn-grid">
          <div class="page-loader"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Recent tickets -->
      <div class="content-card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
          <h3 class="card-title">Tickets Recentes</h3>
          <button class="btn btn-sm btn-secondary" id="sac-refresh-tk">↻ Atualizar</button>
        </div>
        <div id="sac-tk-table-wrap">
          <div class="page-loader"><span class="spinner"></span></div>
        </div>
      </div>

  </main>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/components.js"></script>
<script src="../../assets/js/funcoes/_core.js"></script>
<script src="../../assets/js/funcoes/global_forms.js"></script>
<script src="../../assets/js/funcoes/sac_forms.js"></script>
<script src="../../assets/js/funcoes/sac.js"></script>
<script>
'use strict';

const SAC_FUNCTIONS = [
  { fn: 'f01GerenciarTickets',         icon: '🎟️', label: 'Gerenciar Tickets',           nivel: 2 },
  { fn: 'f02RegistrarAtendimentoAvulso',icon: '📞', label: 'Atendimento Avulso',          nivel: 2 },
  { fn: 'f03VinculoQualidade',          icon: '🔗', label: 'Vínculo Qualidade',           nivel: 3 },
  { fn: 'f04GestaoGarantiasTrocas',     icon: '🔄', label: 'Garantias e Trocas',          nivel: 4 },
  { fn: 'f05ClassificacaoMotivos',      icon: '🏷️', label: 'Motivos de Reclamação',       nivel: 3 },
  { fn: 'f06MonitoramentoNPS',          icon: '📊', label: 'Monitoramento NPS',           nivel: 4 },
  { fn: 'f07ComunicacaoMassa',          icon: '📢', label: 'Comunicação em Massa',        nivel: 4 },
  { fn: 'f08GestaoRecall',              icon: '🚨', label: 'Gestão de Recall',            nivel: 5 },
  { fn: 'f09RelatoriosSLA',             icon: '⏱️', label: 'Relatórios de SLA',           nivel: 4 },
  { fn: 'f10HistoricoCliente',          icon: '🔍', label: 'Histórico do Cliente',        nivel: 3 },
  { fn: 'f11TemplatesResposta',         icon: '📝', label: 'Templates de Resposta',       nivel: 4 },
  { fn: 'f12BaseConhecimento',          icon: '📚', label: 'Base de Conhecimento',        nivel: 2 },
  { fn: 'f13ChatCentralizado',          icon: '💬', label: 'Chat Centralizado',           nivel: 2 },
  { fn: 'f14VerEscala',                 icon: '📅', label: 'Ver Escala SAC',              nivel: 0 },
  { fn: 'f15GerenciarEscalas',          icon: '📆', label: 'Gerenciar Escalas',           nivel: 4 },
];

function _sac_statusBadge(s) {
  const m = {
    aberto: 'warning', em_analise: 'info', aguardando_cliente: 'muted',
    resolvido: 'success', fechado: 'muted', cancelado: 'muted',
  };
  return `<span class="badge badge-${m[s] || 'muted'}">${escapeHtml(s || '—').replace(/_/g,' ')}</span>`;
}
function _sac_prioBadge(p) {
  const m = { baixa: 'success', media: 'info', alta: 'warning', urgente: 'danger' };
  return `<span class="badge badge-${m[p] || 'muted'}">${escapeHtml(p || '—')}</span>`;
}
function _fmtD(v) {
  if (!v) return '—';
  try { return new Date(v).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); } catch { return '—'; }
}

async function loadStats() {
  try {
    const d = await API.get('/sac/stats');
    const s = d.data || d;

    document.getElementById('stat-tickets-abertos').textContent   = s.ticketsAbertos   ?? '—';
    document.getElementById('stat-tickets-urgentes').textContent  = s.ticketsUrgentes  ?? '—';
    document.getElementById('stat-recalls-ativos').textContent    = s.recallsAtivos    ?? '—';
    document.getElementById('stat-atendimentos-hoje').textContent = s.atendimentosHoje ?? '—';

    const bar = document.getElementById('sac-alerts');
    const chips = [];
    if (s.recallsAtivos > 0)      chips.push({ type: 'danger',  text: `${s.recallsAtivos} recall(s) ativo(s) — ação imediata necessária` });
    if (s.ticketsUrgentes > 0)    chips.push({ type: 'danger',  text: `${s.ticketsUrgentes} ticket(s) urgente(s)/alto(s) em aberto` });
    if (s.ticketsAbertos > 0)     chips.push({ type: 'warning', text: `${s.ticketsAbertos} ticket(s) aguardando atendimento` });
    if (s.slaMediaHoras !== null && s.slaMediaHoras !== undefined)
                                  chips.push({ type: 'info',    text: `SLA médio (30d): ${s.slaMediaHoras}h` });
    if (!chips.length)            chips.push({ type: 'success', text: 'Nenhum alerta ativo no momento' });

    bar.innerHTML = chips.map(c =>
      `<span class="sac-alert-chip ${c.type}">${c.type==='danger'?'🚨':c.type==='warning'?'⚠️':c.type==='info'?'ℹ️':'✅'} ${escapeHtml(c.text)}</span>`
    ).join('');
  } catch(err) {
    console.warn('SAC stats error:', err);
  }
}

function renderFunctions(user) {
  const grid = document.getElementById('sac-fn-grid');
  const visible = SAC_FUNCTIONS.filter(f => user.nivel_acesso >= f.nivel);
  if (!visible.length) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🔒</span><span class="empty-state-title">Nenhuma função disponível para seu nível de acesso</span></div>';
    return;
  }
  grid.innerHTML = visible.map(f =>
    `<button class="sac-fn-btn" data-fn="${escapeHtml(f.fn)}" title="${escapeHtml(f.label)}">
       <span class="sac-fn-icon">${f.icon}</span>
       <span>${escapeHtml(f.label)}</span>
     </button>`
  ).join('');
  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.sac-fn-btn');
    if (!btn) return;
    const fn = btn.getAttribute('data-fn');
    if (window.FuncoesSAC && typeof window.FuncoesSAC[fn] === 'function') {
      window.FuncoesSAC[fn]();
    }
  });
}

async function loadTicketsRecentes() {
  const wrap = document.getElementById('sac-tk-table-wrap');
  try {
    const d = await API.get('/sac/tickets?status=aberto');
    const rows = Array.isArray(d) ? d : (d.data || []);
    if (!rows.length) {
      wrap.innerHTML = '<div class="empty-state"><span class="empty-state-icon">✅</span><span class="empty-state-title">Nenhum ticket aberto no momento</span></div>';
      return;
    }
    const top = rows.slice(0, 20);
    wrap.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Código</th>
              <th>Título</th>
              <th>Cliente</th>
              <th>Categoria</th>
              <th>Prioridade</th>
              <th>Status</th>
              <th>Abertura</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody>
            ${top.map(r => {
              const vencido = r.prazo_sla && new Date(r.prazo_sla) < new Date() && !['resolvido','fechado','cancelado'].includes(r.status);
              return `
              <tr${r.prioridade==='urgente' ? ' style="background:rgba(239,68,68,0.07);"' : r.prioridade==='alta' ? ' style="background:rgba(251,146,60,0.05);"' : ''}>
                <td><code>${escapeHtml(r.codigo || '—')}</code>${vencido ? ' <span style="color:#f87171;font-size:11px;">SLA!</span>' : ''}</td>
                <td>${escapeHtml(r.titulo || '—')}</td>
                <td>${escapeHtml(r.cliente_nome || '—')}</td>
                <td><span class="badge badge-muted">${escapeHtml(r.categoria || '—')}</span></td>
                <td>${_sac_prioBadge(r.prioridade)}</td>
                <td>${_sac_statusBadge(r.status)}</td>
                <td>${_fmtD(r.data_abertura)}</td>
                <td><button class="btn btn-sm btn-secondary" onclick="window.FuncoesSAC&&window.FuncoesSAC.f01GerenciarTickets()">Ver</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      ${rows.length > 20 ? `<p style="padding:var(--space-2) var(--space-3);font-size:var(--font-size-xs);color:var(--text-muted);">Exibindo 20 de ${rows.length} tickets. Use "Gerenciar Tickets" para ver todos.</p>` : ''}`;
  } catch(err) {
    wrap.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><span class="empty-state-title">Erro ao carregar tickets: ${escapeHtml(err.message || '')}</span></div>`;
  }
}

async function onReady(user) {
  await Promise.all([loadStats(), loadTicketsRecentes()]);
  renderFunctions(user);
  document.getElementById('sac-refresh-tk').addEventListener('click', loadTicketsRecentes);
}

initPage({
  title: 'SAC',
  breadcrumb: ['SAC'],
  requireNivel: 0,
  activeMenu: 'sac',
  onReady: onReady,
});
</script>
</body>
</html>
